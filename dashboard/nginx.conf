server {
    listen 80;
    server_name localhost;

    client_max_body_size 10M;
    add_header Cache-Control "no-store";

    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy for API (Docker internal hostname)
    location /api/ {
        proxy_pass http://api:5000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # Reverse proxy for NVD API (CORS bypass for production React build)
    location /rest/ {
        proxy_pass https://services.nvd.nist.gov/rest/;
        
        # Required for SSL handshake with NVD servers
        proxy_ssl_server_name on;
        
        proxy_set_header Host services.nvd.nist.gov;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Force download of PowerShell scripts
    location ~* \.ps1$ {
        default_type application/octet-stream;
        types { }
        add_header Content-Type application/octet-stream always;
        add_header Content-Disposition "attachment; filename=siem-agent.ps1" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    # React SPA routing
    location / {
        try_files $uri /index.html;
    }
}

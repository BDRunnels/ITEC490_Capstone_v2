services:
  api:
    build: ./api
    container_name: siem_api
    ports:
      - "5000:5000"          # Optional: expose for direct debugging
    volumes:
      - ./data:/data
    networks:
      - siem_network

  dashboard:
    build: ./dashboard
    container_name: siem_dashboard
    ports:
      - "3000:80"            # Dashboard at http://localhost:3000
    depends_on:
      - api
    networks:
      - siem_network

networks:
  siem_network:
    driver: bridge
